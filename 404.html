<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Страница не найдена</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Unbounded:wght@600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="page-404">
        <div class="page-404__bg"></div>
        <div class="page-404__overlay"></div>

        <div class="page-404__content">
            <div class="page-404__code">404</div>

            <p class="page-404__text-main">
                Ой, страница не найдена.
            </p>

            <p class="page-404__text-sub">
                Похоже, запрашиваемая вами страница не существует или была удалена.<br />
                Не переживайте, я помогу вам вернуться на верную дорогу.
            </p>

            <a href="/" class="page-404__button">
                ВЕРНУТЬСЯ НА ГЛАВНУЮ
                <img src="img/error-404/Arrow-right.svg" alt="" class="page-404__arrow">
            </a>
        </div>
        <img src="img/error-404/404-layer.png" class="page-404__layer">
    </main>
</body>

</html>
